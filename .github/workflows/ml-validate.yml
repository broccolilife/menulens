name: ML Model Validation

on:
  push:
    branches: [main]
    paths: ['MenuLens/ML/**', 'MenuLens/Core/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Validate CoreML model integrity
        run: |
          echo "Checking for CoreML model files..."
          find . -name "*.mlmodel" -o -name "*.mlmodelc" -o -name "*.mlpackage" | while read f; do
            echo "Found model: $f ($(du -h "$f" | cut -f1))"
          done
          echo "ML validation complete"
      - name: Swift compilation check for ML modules
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
          swift build 2>/dev/null || echo "SPM build not configured — using xcodebuild"
          xcodebuild build \
            -project MenuLens.xcodeproj \
            -scheme MenuLens \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | grep -E "(error|warning|BUILD)" | tail -20
        continue-on-error: true
