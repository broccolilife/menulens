name: MenuLens CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -project MenuLens.xcodeproj -scheme MenuLens || true
      - name: Build
        run: |
          xcodebuild build \
            -project MenuLens.xcodeproj \
            -scheme MenuLens \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tail -20
      - name: Test
        run: |
          xcodebuild test \
            -project MenuLens.xcodeproj \
            -scheme MenuLens \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tail -30
        continue-on-error: true

  swiftlint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint || true
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging || swiftlint lint || true
